<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User's table</title>
</head>
<body>

<table>

    <caption>User List</caption>

    <thead>
    <tr>
        <th>id</th>
        <th>Username</th>
        <th>Roles</th>
        <th th:if="${isAdmin}">Delete / Update</th> <!-- только админам -->
        <th th:unless="${isAdmin}">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td>
    <span th:each="role, iter : ${user.roles}"
          th:text="${role.name + (iter.last ? '' : ', ')}">Role</span>
        </td>
        <td th:if="${isAdmin}"> <!-- видно только админам -->
            <form th:action="@{/user/delete}" method="post" style="display: inline;">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="submit" class="btn btn-danger">Удалить</button>
            </form>
            <a th:href="@{/admin(id=${user.id})}" class="btn btn-primary">Редактировать</a>
        </td>

        <td th:unless="${isAdmin}">
            <a th:href="@{/user(id=${user.id})}" class="btn btn-info">Смотреть профиль</a>
        </td>

    </tr>
    </tbody>
</table>
-----------Добавить нового пользователя (только для администраторов)------------
<div>
    <h4>Add new user:</h4>
    <form method="POST" th:action="@{/add-user}">
        <label for="username">Username</label>
        <input name="username" type="text" id="username"/>
        <label for="password">Password</label>
        <input name="password" type="text" id="password"/>
        <input th:if="${isAdmin}" type="submit" value="Добавить пользователя"/>
    </form>
</div>
<form th:action="@{/logout}" method="post" style="display: inline; margin-left: 15px;">
    <button type="submit">Log Out</button>
</form>
</body>
</html>
