<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User - Admin Page</title>
</head>
<body>
    <h2>Edit User: <span th:text="${user.username}"></span></h2>

    <form th:action="@{/admin/update}" method="post">
        <input type="hidden" name="id" th:value="${user.id}"/>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username"
                   th:value="${user.username}" required/>
        </div>

        <div class="form-group">
            <label for="password">New Password (Оставьте поле пустым, если хотите сохранить текущий пароль):</label>
            <input type="password" id="password" name="password"/>
        </div>

        <div class="form-group">
            <label>Roles:</label>
            <div class="role-checkbox-group">
                <div th:each="role : ${allRoles}" class="role-checkbox">
                    <input type="checkbox"
                           id="role-${role.name}"
                           name="roles"
                           th:value="${role.name}"
                           th:checked="${user.roles.contains(role)}"/>
                    <label class="role-button" th:for="|role-${role.name}|"
                           th:text="${role.name}">Role</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Update User</button>
        <a th:href="@{/admin}" class="btn btn-secondary">Cancel</a>
    </form>

    <br/><br/>
    <a href="/admin" class="btn btn-secondary">Back to Users List</a>

    <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 15px;">
        <button type="submit">Log Out</button>
    </form>
</body>
</html>
